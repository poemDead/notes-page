name: Publish Blog Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: startsWith(github.event.issue.title, 'blog:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Insert issue into index.html
        run: node scripts/publish-blog-issue.js
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Publish blog issue #${{ github.event.issue.number }}" || exit 0
          git push

      - name: Comment and close issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue comment "$ISSUE_URL" --body "Published to blog."
          gh issue close "$ISSUE_URL"
